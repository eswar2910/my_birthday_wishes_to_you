<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    /* Scene adds perspective */
    .scene {
      width: 250px;
      height: 350px;
      perspective: 1000px;
    }

    /* Card keeps children in 3D */
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s;
      cursor: pointer;
    }

    /* Flip on hover */
    .scene:hover .card {
      transform: rotateY(180deg);
    }

    /* Front and back faces */
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      border-radius: 10px;
      backface-visibility: hidden;
    }

    .front {
      background:url(images/pexels-suju-27500088.jpg);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .back {
      background:url(images/my_birthday_background.jpg);
      background-position: center;
      background-size: cover;
      transform: rotateY(180deg);
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="card">
      <div class="card-face front">Front Side</div>
      <div class="card-face back">Back Side</div>
    </div>
  </div>

</body>
</html>
